<!DOCTYPE html>
<html>
<head>
    <title>AI Security Assistant</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            padding:30px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        .critical{
            border-left:6px solid red;
        }

        .high{
            border-left:6px solid orange;
        }

        .badge{
            background:red;
            color:white;
            padding:4px 10px;
            border-radius:50%;
            font-size:12px;
        }

        h1{
            margin-bottom:30px;
        }

        .recommendation{
            color:#38bdf8;
        }

        .example{
            background:#020617;
            padding:10px;
            border-radius:8px;
            margin-top:10px;
        }

    </style>
</head>
<body>

<h1>
    AI Security Assistant
    {% if critical_count > 0 %}
        <span class="badge">{{ critical_count }}</span>
    {% endif %}
</h1>

{% for issue in issues %}

<div class="card {% if issue.severity == 'CRITICAL' %}critical{% else %}high{% endif %}">

    <h2>{{ issue.title }}</h2>

    <p><strong>Risk:</strong> {{ issue.severity }}</p>

    <p>{{ issue.description }}</p>

    <p class="recommendation">
        Recommendation:
        {{ issue.recommendation }}
    </p>

    <div class="example">
        <strong>Secure Example:</strong>
        <br>
        {{ issue.secure_example }}
    </div>

</div>

{% endfor %}

</body>
</html>
